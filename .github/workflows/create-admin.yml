name: Create Admin User

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Admin username"
        required: true
        default: "admin"
      password:
        description: "Admin password (min 8 chars, upper+lower+number+special)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  create-admin:
    name: Create Admin User
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set admin credentials as app settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --settings \
                ADMIN_USERNAME="${{ github.event.inputs.username }}" \
                ADMIN_PASSWORD="${{ github.event.inputs.password }}"

      - name: Restart app to trigger user creation
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001
            echo "Waiting 30s for app to start..."
            sleep 30

      - name: Remove admin credentials from app settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings delete \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --setting-names ADMIN_USERNAME ADMIN_PASSWORD
            echo "Admin user created and credentials removed from app settings."
