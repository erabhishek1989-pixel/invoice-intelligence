name: Create Admin User

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Admin username"
        required: true
        default: "admin"
      password:
        description: "Admin password (min 8 chars, upper+lower+number+special)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  create-admin:
    name: Create Admin User
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run create_admin script on App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp ssh \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --command "cd /home/site/wwwroot && ADMIN_USERNAME='${{ github.event.inputs.username }}' ADMIN_PASSWORD='${{ github.event.inputs.password }}' python scripts/create_admin.py"
