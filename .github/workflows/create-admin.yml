name: Create Admin User

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Admin username"
        required: true
        default: "admin"
      password:
        description: "Admin password (min 8 chars, upper+lower+number+special)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  create-admin:
    name: Create Admin User
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run create_admin script via Kudu API
        uses: azure/cli@v2
        with:
          inlineScript: |
            KUDU_USER=$(az webapp deployment list-publishing-credentials \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --query publishingUserName -o tsv)

            KUDU_PASS=$(az webapp deployment list-publishing-credentials \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --query publishingPassword -o tsv)

            U_B64=$(printf '%s' '${{ github.event.inputs.username }}' | base64 -w 0)
            P_B64=$(printf '%s' '${{ github.event.inputs.password }}' | base64 -w 0)

            RESULT=$(curl -s -X POST \
              "https://app-invoiceai-prod-centralindia-001.scm.azurewebsites.net/api/command" \
              -u "$KUDU_USER:$KUDU_PASS" \
              -H "Content-Type: application/json" \
              -d "{\"command\": \"/home/site/wwwroot/antenv/bin/python /home/site/wwwroot/scripts/create_admin.py $U_B64 $P_B64\", \"dir\": \"/home/site/wwwroot\"}")

            echo "=== Kudu Response ==="
            echo "$RESULT"

            EXIT_CODE=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ExitCode',1))" 2>/dev/null || echo "1")
            echo "Exit code: $EXIT_CODE"
            [ "$EXIT_CODE" = "0" ] || exit 1
