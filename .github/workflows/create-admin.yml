name: Create Admin User

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Admin username"
        required: true
        default: "admin"
      password:
        description: "Admin password (min 8 chars, upper+lower+number+special)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  create-admin:
    name: Create Admin User
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create admin user
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp ssh \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --command "cd /home/site/wwwroot && python -c \"
from app import create_app, db
from app.models import User
app = create_app()
with app.app_context():
    db.create_all()
    existing = User.query.filter_by(username='${{ github.event.inputs.username }}').first()
    if existing:
        print('User already exists — updating password')
        existing.set_password('${{ github.event.inputs.password }}')
    else:
        u = User(username='${{ github.event.inputs.username }}', role='admin')
        u.set_password('${{ github.event.inputs.password }}')
        db.session.add(u)
        print('Admin user created')
    db.session.commit()
    print('Done')
\""
