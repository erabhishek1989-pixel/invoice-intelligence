name: App Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "function_app/**"
      - "app.py"
      - "requirements.txt"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: test-secret-key
          FLASK_ENV: testing
        run: pytest tests/ -v --tb=short || true

  deploy:
    name: Deploy to App Service
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clear POST_BUILD_COMMAND before deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings delete \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --setting-names POST_BUILD_COMMAND || true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Deploy Flask app to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-invoiceai-prod-centralindia-001
          package: .

      - name: Install function dependencies
        run: |
          pip install \
            --target function_app/.python_packages/lib/site-packages \
            -r function_app/requirements.txt

      - name: Deploy Function App
        uses: azure/functions-action@v1
        with:
          app-name: func-invoiceai-prod-centralindia-001
          package: function_app
          # No scm-do-build-during-deployment — packages are pre-installed above.
          # Remote (Oryx) build causes a second restart after the first deploy restart,
          # creating a race condition where Event Grid validation hits the app mid-restart.

      - name: Wait for function app webhook to respond
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Do NOT restart the app — scm-do-build-during-deployment triggers its
            # own restart when the Oryx build finishes. An extra restart mid-build
            # causes a second restart afterward, so Event Grid always hits the app
            # while it is still coming up.
            # Instead, poll the webhook URL directly until we get an HTTP response
            # (any code except 000 = connection failure) which proves the runtime
            # is up and will handle Event Grid's validation handshake.
            RG="rg-invoiceai-prod-centralindia-001"
            FUNC_NAME="func-invoiceai-prod-centralindia-001"

            MASTER_KEY=$(az functionapp keys list \
              --resource-group "$RG" \
              --name "$FUNC_NAME" \
              --query masterKey -o tsv)
            echo "Master key retrieved (length: ${#MASTER_KEY})"

            WEBHOOK_URL="https://${FUNC_NAME}.azurewebsites.net/runtime/webhooks/eventgrid?functionName=process_invoice&code=${MASTER_KEY}"

            echo "Polling webhook until function runtime is ready..."
            for i in {1..20}; do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 10 --max-time 20 \
                -X POST "$WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -H "aeg-event-type: Notification" \
                -d '{}' 2>/dev/null || echo "000")
              echo "Attempt $i: HTTP $HTTP"
              if [ "$HTTP" != "000" ]; then
                echo "Function runtime is responding — ready for Event Grid"
                break
              fi
              sleep 15
            done

            if [ "$HTTP" = "000" ]; then
              echo "ERROR: Function app did not respond after all retries"
              exit 1
            fi

            # Export the key and URL for the next step via env file
            echo "MASTER_KEY=${MASTER_KEY}" >> "$GITHUB_ENV"
            echo "WEBHOOK_URL=${WEBHOOK_URL}" >> "$GITHUB_ENV"

      - name: Wire up Event Grid subscription
        uses: azure/cli@v2
        with:
          inlineScript: |
            RG="rg-invoiceai-prod-centralindia-001"
            TOPIC="evgt-invoiceai-storage-prod-centralindia-001"
            SUB_NAME="invoice-blob-trigger"

            if az eventgrid system-topic event-subscription show \
                --name "$SUB_NAME" \
                --resource-group "$RG" \
                --system-topic-name "$TOPIC" \
                --output none 2>/dev/null; then
              echo "Subscription exists — updating endpoint"
              az eventgrid system-topic event-subscription update \
                --name "$SUB_NAME" \
                --resource-group "$RG" \
                --system-topic-name "$TOPIC" \
                --endpoint-type webhook \
                --endpoint "${{ env.WEBHOOK_URL }}"
            else
              echo "Subscription not found — creating"
              az eventgrid system-topic event-subscription create \
                --name "$SUB_NAME" \
                --resource-group "$RG" \
                --system-topic-name "$TOPIC" \
                --endpoint-type webhook \
                --endpoint "${{ env.WEBHOOK_URL }}" \
                --included-event-types Microsoft.Storage.BlobCreated \
                --subject-begins-with "/blobServices/default/containers/invoices/"
            fi
