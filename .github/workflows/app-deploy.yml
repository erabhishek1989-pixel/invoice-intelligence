name: App Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "function_app/**"
      - "app.py"
      - "requirements.txt"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: test-secret-key
          FLASK_ENV: testing
        run: pytest tests/ -v --tb=short || true

  deploy:
    name: Deploy to App Service
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clear POST_BUILD_COMMAND before deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings delete \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --setting-names POST_BUILD_COMMAND || true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Deploy Flask app to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-invoiceai-prod-centralindia-001
          package: .

      - name: Deploy Function App
        uses: azure/functions-action@v1
        with:
          app-name: func-invoiceai-prod-centralindia-001
          package: function_app
          scm-do-build-during-deployment: true

      - name: Wire up Event Grid subscription
        uses: azure/cli@v2
        with:
          inlineScript: |
            FUNC_ID="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-invoiceai-prod-centralindia-001/providers/Microsoft.Web/sites/func-invoiceai-prod-centralindia-001/functions/process_invoice"

            az eventgrid system-topic event-subscription create \
              --name invoice-blob-trigger \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --system-topic-name evgt-invoiceai-storage-prod-centralindia-001 \
              --endpoint-type azurefunction \
              --endpoint "$FUNC_ID" \
              --included-event-types Microsoft.Storage.BlobCreated \
              --subject-begins-with "/blobServices/default/containers/invoices/" \
            2>/dev/null || \
            az eventgrid system-topic event-subscription update \
              --name invoice-blob-trigger \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --system-topic-name evgt-invoiceai-storage-prod-centralindia-001 \
              --endpoint-type azurefunction \
              --endpoint "$FUNC_ID"
