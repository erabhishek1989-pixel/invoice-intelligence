name: App Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "function_app/**"
      - "app.py"
      - "requirements.txt"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: test-secret-key
          FLASK_ENV: testing
        run: pytest tests/ -v --tb=short || true

  deploy:
    name: Deploy to App Service
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clear POST_BUILD_COMMAND before deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings delete \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name app-invoiceai-prod-centralindia-001 \
              --setting-names POST_BUILD_COMMAND || true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Deploy Flask app to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-invoiceai-prod-centralindia-001
          package: .

      - name: Deploy Function App
        uses: azure/functions-action@v1
        with:
          app-name: func-invoiceai-prod-centralindia-001
          package: function_app
          scm-do-build-during-deployment: true

      - name: Restart function app and wait for warm-up
        uses: azure/cli@v2
        with:
          inlineScript: |
            az functionapp restart \
              --resource-group rg-invoiceai-prod-centralindia-001 \
              --name func-invoiceai-prod-centralindia-001
            echo "Waiting 40s for function app to start and register triggers..."
            sleep 40

      - name: Wire up Event Grid subscription
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Python v2 decorator-based functions do not register as individual ARM
            # resources so --endpoint-type azurefunction always fails validation.
            # Use --endpoint-type webhook — Event Grid sends a live validation
            # handshake to the function URL which the runtime handles automatically.
            RG="rg-invoiceai-prod-centralindia-001"
            FUNC_NAME="func-invoiceai-prod-centralindia-001"
            TOPIC="evgt-invoiceai-storage-prod-centralindia-001"
            SUB_NAME="invoice-blob-trigger"

            # Use the eventgrid_extension system key (scoped to Event Grid only)
            MASTER_KEY=$(az functionapp keys list \
              --resource-group "$RG" \
              --name "$FUNC_NAME" \
              --query "systemKeys.eventgrid_extension" -o tsv)

            # Fall back to master key if extension key not yet provisioned
            if [ -z "$MASTER_KEY" ] || [ "$MASTER_KEY" = "None" ]; then
              echo "eventgrid_extension key not found, falling back to master key"
              MASTER_KEY=$(az functionapp keys list \
                --resource-group "$RG" \
                --name "$FUNC_NAME" \
                --query masterKey -o tsv)
            fi

            echo "Key retrieved (length: ${#MASTER_KEY})"

            WEBHOOK_URL="https://${FUNC_NAME}.azurewebsites.net/runtime/webhooks/eventgrid?functionName=process_invoice&code=${MASTER_KEY}"

            if az eventgrid system-topic event-subscription show \
                --name "$SUB_NAME" \
                --resource-group "$RG" \
                --system-topic-name "$TOPIC" \
                --output none 2>/dev/null; then
              echo "Subscription exists — updating endpoint"
              az eventgrid system-topic event-subscription update \
                --name "$SUB_NAME" \
                --resource-group "$RG" \
                --system-topic-name "$TOPIC" \
                --endpoint-type webhook \
                --endpoint "$WEBHOOK_URL"
            else
              echo "Subscription not found — creating"
              az eventgrid system-topic event-subscription create \
                --name "$SUB_NAME" \
                --resource-group "$RG" \
                --system-topic-name "$TOPIC" \
                --endpoint-type webhook \
                --endpoint "$WEBHOOK_URL" \
                --included-event-types Microsoft.Storage.BlobCreated \
                --subject-begins-with "/blobServices/default/containers/invoices/"
            fi
